# monitoring/grafana/dashboards/dashboards.yaml
# Spune Grafana unde să găsească fișierele JSON cu dashboards.

apiVersion: 1

providers:
  - name: MeetRec
    orgId: 1
    folder: MeetRec
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
