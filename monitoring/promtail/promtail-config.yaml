# monitoring/promtail/promtail-config.yaml
# Promtail = agentul care colectează loguri și le trimite la Loki
# Gândește-te la el ca la un "poștaș" care adună scrisorile (logurile)
# din toată fabrica și le duce la arhivă (Loki)

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml  # ține minte ce loguri a trimis deja

clients:
  - url: http://loki:3100/loki/api/v1/push  # unde trimite logurile

scrape_configs:
  # Colectează loguri din toate containerele Docker
  - job_name: docker-containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      # Parsează logurile JSON ale Docker
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          expressions:
            tag: attrs.tag
          source: attrs
      # Extrage numele containerului din tag
      - regex:
          expression: '(?P<container_name>(?:[^|]*[^|]))'
          source: tag
      - labels:
          stream:
          container_name:
      - output:
          source: output