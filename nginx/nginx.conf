# nginx/nginx.conf — Configurarea principală Nginx
# Nginx = "portar" al aplicației noastre
# Tot traficul trece prin el înainte să ajungă la servicii

worker_processes auto;  # folosește toate core-urile CPU disponibile
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;  # maxim 1024 conexiuni simultane per worker
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Format log detaliat
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;          # optimizare pentru transfer fișiere
    keepalive_timeout 65;

    # Compresie GZIP — reduce dimensiunea răspunsurilor cu ~70%
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Limitare dimensiune upload (fișiere audio pot fi mari)
    client_max_body_size 600M;  # maxim 600MB per request

    # Importă configurările specifice
    include /etc/nginx/conf.d/*.conf;
}