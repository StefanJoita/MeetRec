# nginx/conf.d/meeting-transcriber.conf
# Configurarea specifică a aplicației noastre

# Redirecționează HTTP → HTTPS (nimeni nu accesează fără criptare)
server {
    listen 80;
    server_name _;  # _ = orice hostname
    return 301 https://$host$request_uri;  # 301 = redirect permanent
}

# Server principal HTTPS
server {
    listen 443 ssl;
    server_name ${SERVER_NAME};  # citit din variabilele de mediu

    # Certificate SSL
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Setări SSL moderne (dezactivează versiuni vechi nesigure)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers (protecții extra)
    add_header X-Frame-Options SAMEORIGIN;        # previne clickjacking
    add_header X-Content-Type-Options nosniff;    # previne MIME sniffing
    add_header X-XSS-Protection "1; mode=block";  # protecție XSS browser

    # Proxy pentru API (/api/* → containerul api:8080)
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;       # IP-ul real al clientului
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout mare pentru transcrieri lungi
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Proxy pentru WebSocket (notificări în timp real)
    location /ws/ {
        proxy_pass http://api:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Frontend React (/* → containerul frontend)
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
    }
}
