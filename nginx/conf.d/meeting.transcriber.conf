# nginx/conf.d/meeting-transcriber.conf
# Configurare HTTP pentru development (fără SSL)
# Pentru producție: adaugă certificate și activează HTTPS

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # Dimensiune maximă upload (fișiere audio mari)
    client_max_body_size 600M;

    # Proxy pentru API (/api/* → containerul api:8080)
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Frontend React (/* → containerul frontend:80)
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
    }
}
