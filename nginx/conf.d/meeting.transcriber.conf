# nginx/conf.d/meeting-transcriber.conf
# HTTP → HTTPS redirect + HTTPS cu SSL termination

# -----------------------------------------------------------
# HTTP — redirecționează tot traficul la HTTPS
# -----------------------------------------------------------
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# -----------------------------------------------------------
# HTTPS — serverul principal
# -----------------------------------------------------------
server {
    listen 443 ssl;
    server_name _;

    # Certificate SSL (self-signed sau Let's Encrypt)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Protocoale și ciphers moderne
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-XSS-Protection "1; mode=block";

    # Dimensiune maximă upload (fișiere audio mari)
    client_max_body_size 600M;

    # Streaming audio — fără buffering pentru Range requests (seek/scrub)
    # Această regulă trebuie să fie înainte de /api/ (mai specifică)
    location ~* /api/v1/recordings/[^/]+/audio {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Proxy pentru API (/api/* → containerul api:8080)
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Frontend React (/* → containerul frontend:80)
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
