server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-lived cache for hashed static assets (JS/CSS bundles have content hashes)
    location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: any path that doesn't match a file → index.html
    # This allows React Router to handle client-side navigation.
    # Without this, refreshing /recordings/abc123 returns a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
